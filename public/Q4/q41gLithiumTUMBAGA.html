<!DOCTYPE html>
<html lang="en">
<head>

<!-- Basic page setup -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Tracker</title>
<meta name="author" content="TUMBAGA, Rea Xyrille D.">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Orbitron', sans-serif;

    background:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.06), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(255,255,255,0.06), transparent 45%),
        linear-gradient(135deg, #d3238a, #e77f3a, #5b2686);

    color:white;
}

/* container for the movie form and list */
.container{
    background:rgba(0,0,0,0.85);
    padding:30px;
    border-radius:10px;
    width:420px;
    box-shadow:0 8px 25px rgba(0,0,0,0.6);
}

h2{
    text-align:center;
    font-family:'Press Start 2P', cursive;
    font-size:1em;
    margin-bottom:20px;
}

input, select{
    width:100%;
    padding:10px 12px;
    margin-bottom:14px;
    border-radius:5px;
    border:none;
    font-family:'Orbitron', sans-serif;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:11px;
    border:none;
    border-radius:5px;
    background:#d3238a;
    color:white;
    font-weight:bold;
    cursor:pointer;
    margin-bottom:20px;
}

button:hover{
    background:#b81f75;
}

/* star rating styling */
.stars{
    font-size:26px;
    text-align:center;
    margin-bottom:18px;
}

.stars span{
    color:#777;
    cursor:pointer;
    margin:0 3px;
}

.stars .active{
    color:#ffd700;
}

/* movie display box */
.movie{
    background:rgba(255,255,255,0.12);
    padding:12px 14px;
    border-radius:6px;
    margin-bottom:10px;
    line-height:1.5;

    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
}

.rating{
    color:#ffd700;
}

.deleteBtn{
    width:auto;
    padding:5px 10px;
    font-size:12px;
    margin:0;
    background:#444;
}

.deleteBtn:hover{
    background:#666;
}

#list{
    margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<h2>Add Movie</h2>

<!-- movie title input -->
<input id="title" placeholder="Movie Title">

<!-- movie year input -->
<input id="year" type="number" placeholder="Year">

<!-- dropdown to select movie genre -->
<select id="genre">
<option value="">-- Choose a genre --</option>
<option>Action</option>
<option>Comedy</option>
<option>Drama</option>
<option>Sci-Fi</option>
</select>

<!-- clickable star rating -->
<div class="stars" id="stars">
<span data="1">★</span>
<span data="2">★</span>
<span data="3">★</span>
<span data="4">★</span>
<span data="5">★</span>
</div>

<!-- button that adds the movie -->
<button onclick="addMovie()">Add Movie</button>

<h2>Movie List</h2>
<div id="list"></div>

</div>

<script>

/* sets and stores the selected star rating */
let rating = 0

const stars = document.querySelectorAll("#stars span")

stars.forEach(s=>{
    s.onclick=()=>{
        rating = s.getAttribute("data")
        updateStars()
    }
})

function updateStars(){
    stars.forEach(s=>{
        s.classList.toggle("active", s.getAttribute("data") <= rating)
    })
}

/* function to add a movie and save it */
function addMovie(){

    const title = document.getElementById("title").value
    const year = document.getElementById("year").value
    const genre = document.getElementById("genre").value

    if(!title || !year || !genre || rating==0){
        alert("Fill all fields")
        return
    }

    const movies = JSON.parse(localStorage.getItem("movies") || "[]")

    // check if movie already exists
    const index = movies.findIndex(m => m.title.toLowerCase() === title.toLowerCase())

    if(index !== -1){

        // average the ratings
        const oldRating = Number(movies[index].rating)
        const newRating = Number(rating)
        const avgRating = (oldRating + newRating) / 2

        movies[index] = {
            title,
            year,
            genre,
            rating: avgRating
        }

    }else{

        movies.push({title,year,genre,rating})

    }

    localStorage.setItem("movies", JSON.stringify(movies))

    document.getElementById("title").value=""
    document.getElementById("year").value=""
    document.getElementById("genre").value=""

    rating=0
    updateStars()

    render()
}

/* function to delete a movie from the list */
function deleteMovie(index){

    const confirmDelete = confirm("Are you sure you want to delete this movie?")

    if(confirmDelete){

        const movies = JSON.parse(localStorage.getItem("movies") || "[]")

        movies.splice(index,1)

        localStorage.setItem("movies", JSON.stringify(movies))

        render()

    }
}

/* converts the rating to star symbols (e.g. 3.5 -> "★★★½") */
function getStars(rating){

    const fullStars = Math.floor(rating)
    const halfStar = rating % 1 >= 0.5 ? "½" : ""

    return "★".repeat(fullStars) + halfStar
}

/* displays all saved movies on the page */
function render(){

    const movies = JSON.parse(localStorage.getItem("movies") || "[]")
    const list = document.getElementById("list")

    list.innerHTML = movies.map((m,i) => `
        <div class="movie">
        ${m.title} (${m.year}) - ${m.genre}, Rating: 
        <span class="rating">${getStars(m.rating)}</span>
        <button class="deleteBtn" onclick="deleteMovie(${i})">Delete</button>
        </div>
    `).join("")
}

render()

</script>

</body>
</html>
